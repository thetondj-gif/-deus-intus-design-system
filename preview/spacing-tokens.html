<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Deus Intus Spacing</title>
  <link rel="stylesheet" href="../colors_and_type.css">
  <style>
    main { padding: var(--space-8) var(--space-6); }
    .stack { display: grid; gap: var(--space-4); max-width: 800px; padding: var(--space-6); }
    .row { display: flex; align-items: center; gap: var(--space-4); }
    .bar { height: 24px; background: linear-gradient(90deg, var(--di-sacred-gold), var(--di-aqua)); border-radius: 999px; }
  </style>
</head>
<body>
  <main class="di-shell">
    <p class="di-command di-eyebrow">Spacing Tokens</p>
    <h1 class="di-display" style="font-size: var(--type-3xl); margin-bottom: var(--space-5);">Breathing Room System</h1>
    <section class="di-card stack">
      <div class="row"><code>space 2</code><div class="bar" style="width: 0.5rem;"></div></div>
      <div class="row"><code>space 4</code><div class="bar" style="width: 1rem;"></div></div>
      <div class="row"><code>space 6</code><div class="bar" style="width: 2rem;"></div></div>
      <div class="row"><code>space 8</code><div class="bar" style="width: 5rem;"></div></div>
      <div class="row"><code>space 9</code><div class="bar" style="width: 7rem;"></div></div>
    </section>
  </main>
</body>
</html>
