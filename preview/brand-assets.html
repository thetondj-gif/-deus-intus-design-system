<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Deus Intus Brand Assets</title>
  <link rel="stylesheet" href="../colors_and_type.css">
  <style>
    main { padding: var(--space-8) var(--space-6); }
    .brand { padding: var(--space-8); text-align: center; }
    .mark {
      width: 156px;
      height: 156px;
      margin: 0 auto var(--space-5);
      border: 1px solid var(--color-border);
      border-radius: 50%;
      display: grid;
      place-items: center;
      background: radial-gradient(circle at center, rgba(132, 215, 210, 0.12), transparent 45%);
      box-shadow: var(--shadow-gold);
    }
    .flame {
      width: 44px;
      height: 64px;
      border: 1px solid var(--di-sacred-gold);
      border-radius: 50% 50% 58% 58%;
      position: relative;
      transform: rotate(45deg);
    }
    .flame::before {
      content: "";
      position: absolute;
      inset: 10px;
      border: 1px solid var(--di-soft-gold);
      border-radius: 50% 50% 58% 58%;
    }
    .copy { max-width: 44rem; margin: var(--space-4) auto 0; }
  </style>
</head>
<body>
  <main class="di-shell">
    <section class="di-card brand">
      <div class="mark" aria-label="Deus Intus symbolic flame placeholder"><span class="flame"></span></div>
      <p class="di-command di-eyebrow">Brand Signal</p>
      <h1 class="di-display" style="font-size: var(--type-3xl); margin: 0 0 var(--space-4);">Awaken the Power Within.</h1>
      <p class="di-lead copy">Use the mark zone with ceremonial restraint: central composition, gold-led symbolism, and enough negative space for the identity to feel calm, premium, and memorable.</p>
    </section>
  </main>
</body>
</html>
