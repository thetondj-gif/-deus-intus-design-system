<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Deus Intus Brand Assets</title>
  <link rel="stylesheet" href="../colors_and_type.css">
  <style>
    main { padding: var(--space-7); }
    .brand { padding: var(--space-7); text-align: center; position: relative; overflow: hidden; }
    .mark { width: 150px; height: 150px; margin: 0 auto var(--space-5); border: 1px solid var(--di-aether-gold); border-radius: 50%; display: grid; place-items: center; box-shadow: var(--shadow-gold); }
    .flame { font-size: 4rem; color: var(--di-aether-gold); }
    .meta { color: var(--color-text-muted); max-width: 640px; margin: var(--space-4) auto 0; }
  </style>
</head>
<body>
  <main>
    <section class="di-card brand">
      <div class="mark" aria-label="Abstract Deus Intus inner flame placeholder"><span class="flame">◆</span></div>
      <p class="di-command">Deus Intus</p>
      <h1 class="di-display">Awaken the Power Within.</h1>
      <p class="meta">This preview reserves the brand asset area for preserved originals when runtime or build assets are captured. Until image files are added, the abstract mark demonstrates placement, scale, contrast, and gold treatment.</p>
    </section>
  </main>
</body>
</html>
