<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Deus Intus Buttons</title>
  <link rel="stylesheet" href="../colors_and_type.css">
  <style>
    main { padding: var(--space-8) var(--space-6); }
    .panel { padding: var(--space-7); display: grid; gap: var(--space-5); max-width: 960px; }
    .actions { display: flex; flex-wrap: wrap; gap: var(--space-4); }
  </style>
</head>
<body>
  <main class="di-shell">
    <article class="di-card panel">
      <p class="di-command di-eyebrow">Component Preview</p>
      <h1 class="di-display" style="font-size: var(--type-3xl);">Buttons and Calls to Action</h1>
      <p class="di-lead">Primary actions should feel ceremonial and clear. Secondary actions stay quiet. Tertiary actions guide without shouting.</p>
      <div class="actions">
        <a class="di-button" href="#">Enter the Collection</a>
        <a class="di-button secondary" href="#">Explore the Laws</a>
        <a class="di-button tertiary" href="#">Return to Centre</a>
      </div>
    </article>
  </main>
</body>
</html>
