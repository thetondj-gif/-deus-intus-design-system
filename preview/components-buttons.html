<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Deus Intus Buttons</title>
  <link rel="stylesheet" href="../colors_and_type.css">
  <style>
    main { padding: var(--space-7); }
    .panel { padding: var(--space-6); display: grid; gap: var(--space-5); max-width: 900px; }
    .actions { display: flex; flex-wrap: wrap; gap: var(--space-4); }
  </style>
</head>
<body>
  <main>
    <article class="di-card panel">
      <p class="di-command">Component Preview</p>
      <h1 class="di-display">Buttons and Calls to Action</h1>
      <p>Use restrained, high-contrast actions with Aether Gold as the premium conversion accent.</p>
      <div class="actions">
        <a class="di-button" href="#">Shop the Collection</a>
        <a class="di-button secondary" href="#">Explore the Laws</a>
      </div>
    </article>
  </main>
</body>
</html>
