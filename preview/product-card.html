<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Deus Intus Product Card</title>
  <link rel="stylesheet" href="../colors_and_type.css">
  <style>
    main { padding: var(--space-7); }
    .product { display: grid; grid-template-columns: 1fr 1fr; gap: var(--space-6); padding: var(--space-6); align-items: center; max-width: 1000px; }
    .mock { min-height: 360px; border: 1px solid var(--color-border); border-radius: var(--radius-xl); display: grid; place-items: center; background: radial-gradient(circle at 50% 35%, rgba(212,175,55,.16), transparent 38%), #0b0b0b; }
    .symbol { color: var(--di-aether-gold); font-size: 5rem; }
    @media (max-width: 760px) { .product { grid-template-columns: 1fr; } }
  </style>
</head>
<body>
  <main>
    <article class="di-card product">
      <div class="mock"><span class="symbol">◇</span></div>
      <section>
        <p class="di-command">Sacred Geometry Collection</p>
        <h1 class="di-display">Premium Heavyweight Tee</h1>
        <p>Obsidian cotton, restrained Aether Gold geometry, and a calm command-state presence for everyday self-mastery.</p>
        <a class="di-button" href="#">View Collection</a>
      </section>
    </article>
  </main>
</body>
</html>
