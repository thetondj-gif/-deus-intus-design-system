<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Deus Intus Colours</title>
  <link rel="stylesheet" href="../colors_and_type.css">
  <style>
    main { padding: var(--space-7); }
    .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(180px, 1fr)); gap: var(--space-5); }
    .swatch { min-height: 190px; padding: var(--space-4); display: flex; flex-direction: column; justify-content: flex-end; }
    .obsidian { background: var(--di-obsidian); }
    .alabaster { background: var(--di-alabaster); color: var(--di-obsidian); }
    .gold { background: var(--di-aether-gold); color: var(--di-obsidian); }
    .indigo { background: var(--di-pineal-indigo); }
    .sage { background: var(--di-prana-sage); color: var(--di-obsidian); }
  </style>
</head>
<body>
  <main>
    <p class="di-command">Awaken the Power Within.</p>
    <h1 class="di-display">Primary Colour System</h1>
    <section class="grid">
      <article class="di-card swatch obsidian"><strong>Obsidian</strong><span>#050505</span></article>
      <article class="di-card swatch alabaster"><strong>Alabaster</strong><span>#FAFAFA</span></article>
      <article class="di-card swatch gold"><strong>Aether Gold</strong><span>#D4AF37</span></article>
      <article class="di-card swatch indigo"><strong>Pineal Indigo</strong><span>#2D004B</span></article>
      <article class="di-card swatch sage"><strong>Prana Sage</strong><span>#8A9A86</span></article>
    </section>
  </main>
</body>
</html>
